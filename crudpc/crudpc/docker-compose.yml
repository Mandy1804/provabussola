version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: computadorbussola-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: computadorbussoladb
      MYSQL_USER: bussolauser
      MYSQL_PASSWORD: bussolapass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - computadorbussola-network

networks:
  computadorbussola-network:

volumes:
  mysql_data: